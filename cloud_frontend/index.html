<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당근장터</title>
  <link rel="icon" type="image/png" href="/assets/image.png" />
  <link rel="stylesheet" href="/css/tailwind.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">
  <div id="header"></div>
  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 py-8">
      <div id="banner-slider" class="mb-12"></div>

      <section>
        <div class="mb-10">
          <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">오늘의 새로운 상품</h2>
          <p class="text-gray-500 mt-1">당신을 위한 새로운 아이템들</p>
        </div>

        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8">
          <!-- 스켈레톤은 home.js에서 그려넣음 -->
        </div>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <script type="module" src="/js/pages/home.js"></script>

</html>
